name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Patch version into source
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # For branch pushes ref_name is the branch name; use 0.0.0 as dev sentinel.
          if ($tag -match '^v\d') {
            $version = $tag.TrimStart('v')
          } else {
            $version = "0.0.0"
          }
          (Get-Content ha_agent.py -Raw) `
            -replace 'VERSION = ".*?"', "VERSION = `"$version`"" |
            Set-Content ha_agent.py
          Write-Host "Version set to $version"

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name ha-agent
          --hidden-import=zeroconf._utils.ipaddress
          --hidden-import=zeroconf._dns
          --hidden-import=zeroconf._handlers.query_handler
          --hidden-import=zeroconf._handlers.record_manager
          --hidden-import=paho.mqtt.client
          --hidden-import=pystray._win32
          ha_agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ha-agent-exe
          path: dist/ha-agent.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/ha-agent.exe
          generate_release_notes: true
